<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#07101E"/>
  <title>Joining Phantom AI...</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background-color: #07101E !important; min-height: 100vh; }
    body {
      background: #07101E;
      color: #C6973F;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo { font-size:32px;font-weight:900;letter-spacing:0.12em;color:#fff;margin-bottom:40px;text-transform:uppercase; }
    .logo span { color:#C6973F; }
    .spinner { width:52px;height:52px;border:3px solid rgba(198,151,63,0.2);border-top-color:#C6973F;border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:28px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .progress { width:180px;height:3px;background:rgba(198,151,63,0.15);border-radius:2px;margin:0 auto 32px;overflow:hidden; }
    .progress-bar { height:100%;background:#C6973F;width:0%;animation:load 1.5s linear forwards;border-radius:2px; }
    @keyframes load { to { width:100%; } }
    h2 { font-size:22px;font-weight:700;color:#fff;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px; }
    .sub { font-size:14px;color:#6B7A99;margin-bottom:36px;line-height:1.6; }
    .btn { display:inline-flex;align-items:center;gap:10px;background:#C6973F;color:#07101E;font-size:17px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:18px 36px;border-radius:12px;text-decoration:none;box-shadow:0 0 24px rgba(198,151,63,0.4); }
    .source { margin-top:28px;font-size:11px;color:rgba(107,122,153,0.5);letter-spacing:0.08em; }
  </style>
</head>
<body>
  <div class="logo">PHANTOM<span>AI</span></div>
  <div class="spinner"></div>
  <div class="progress"><div class="progress-bar"></div></div>
  <h2>Opening Telegram...</h2>
  <p class="sub">Taking you to the Phantom AI community.<br/>If nothing happens — tap the button below.</p>
  <a id="btn" href="https://t.me/Zee_PhantomAI_Bot" class="btn">
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
      <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
    </svg>
    Start With Phantom AI
  </a>
  <p class="source" id="source"></p>
  <script>
    var src = new URLSearchParams(window.location.search).get('utm_source') || 'direct';
    var TELEGRAM = 'https://t.me/Zee_PhantomAI_Bot';
    var WEBHOOK = 'https://hook.eu1.make.com/lxmcf95pqifaqu91px2qkovw2ovmxwfq';
    var p = new URLSearchParams(window.location.search);
    var src = p.get('utm_source') || 'direct';
    var med = p.get('utm_medium') || 'unknown';
    try { localStorage.setItem('utm_source',src); localStorage.setItem('utm_medium',med); } catch(e){}
    var tag = document.getElementById('source');
    if(tag) tag.textContent = 'via ' + src + ' / ' + med;
    document.getElementById('btn').href = TELEGRAM;
    document.getElementById('btn').href = TELEGRAM;
    try {
      fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:'access_page_visit',utm_source:src,utm_medium:med,timestamp:new Date().toISOString(),referrer:document.referrer||'none'})}).catch(function(){});
    } catch(e){}
    setTimeout(function(){ window.location.href = TELEGRAM; }, 1500);
    setTimeout(function(){ try{ window.location.replace(TELEGRAM); }catch(e){} }, 3000);
  </script>
</body>
</html>
